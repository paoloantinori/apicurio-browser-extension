<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 13px;
      color: #24292f;
      background: #fff;
      padding: 12px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #d0d7de;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
    }
    .header .version {
      font-size: 11px;
      color: #656d76;
      margin-left: auto;
    }
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
    }
    .setting-row label {
      font-size: 13px;
      color: #24292f;
    }
    .setting-section {
      margin-bottom: 8px;
    }
    .setting-section h2 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #656d76;
      margin-bottom: 4px;
    }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #d0d7de;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .toggle .slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      bottom: 2px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.15s;
    }
    .toggle input:checked + .slider {
      background: #0969da;
    }
    .toggle input:checked + .slider::before {
      transform: translateX(16px);
    }
    .toggle input:focus-visible + .slider {
      outline: 2px solid #0969da;
      outline-offset: 2px;
    }
    select {
      font-size: 12px;
      padding: 4px 8px;
      border: 1px solid #d0d7de;
      border-radius: 4px;
      background: #fff;
      color: #24292f;
    }
    .token-status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #d0d7de;
      flex-shrink: 0;
    }
    .status-dot.connected { background: #1a7f37; }
    .status-dot.error { background: #cf222e; }
    .status-text { color: #656d76; }
    .token-input-row {
      display: flex;
      gap: 4px;
      margin-bottom: 6px;
    }
    .token-input-row input {
      flex: 1;
      font-size: 12px;
      padding: 4px 8px;
      border: 1px solid #d0d7de;
      border-radius: 4px;
      font-family: monospace;
    }
    .btn-icon {
      padding: 4px 6px;
      border: 1px solid #d0d7de;
      border-radius: 4px;
      background: #f6f8fa;
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
    }
    .btn-icon:hover { background: #eaeef2; }
    .token-actions {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }
    .btn {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 4px;
      border: 1px solid #d0d7de;
      cursor: pointer;
      background: #f6f8fa;
    }
    .btn:hover { background: #eaeef2; }
    .btn-primary { background: #0969da; color: #fff; border-color: #0969da; }
    .btn-primary:hover { background: #0550ae; }
    .btn-danger { background: #fff; color: #cf222e; border-color: #cf222e; }
    .btn-danger:hover { background: #fef2f2; }
    .help-text {
      font-size: 11px;
      color: #656d76;
      line-height: 1.4;
    }
    .help-text a { color: #0969da; text-decoration: none; }
    .help-text a:hover { text-decoration: underline; }
    .help-text strong { color: #24292f; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Apicurio Visualizer</h1>
    <span class="version">0.1.0</span>
  </div>

  <div class="setting-section">
    <div class="setting-row">
      <label for="autoRender">Auto-render specs</label>
      <div class="toggle">
        <input type="checkbox" id="autoRender">
        <span class="slider"></span>
      </div>
    </div>
  </div>

  <div class="setting-section">
    <h2>Platforms</h2>
    <div class="setting-row">
      <label for="githubEnabled">GitHub</label>
      <div class="toggle">
        <input type="checkbox" id="githubEnabled">
        <span class="slider"></span>
      </div>
    </div>
    <div class="setting-row">
      <label for="gitlabEnabled">GitLab</label>
      <div class="toggle">
        <input type="checkbox" id="gitlabEnabled">
        <span class="slider"></span>
      </div>
    </div>
  </div>

  <div class="setting-section">
    <h2>Theme</h2>
    <div class="setting-row">
      <label for="theme">Appearance</label>
      <select id="theme">
        <option value="auto">Auto (follow site)</option>
        <option value="light">Light</option>
        <option value="dark">Dark</option>
      </select>
    </div>
  </div>

  <div class="setting-section" id="tokenSection">
    <h2>GitHub Token</h2>
    <div class="token-status" id="authStatus">
      <span class="status-dot"></span>
      <span class="status-text">Not configured</span>
    </div>
    <div class="token-input-row">
      <input type="password" id="githubToken" placeholder="ghp_... or github_pat_..." autocomplete="off">
      <button type="button" id="toggleTokenVisibility" class="btn-icon" aria-label="Show token" title="Show token">👁</button>
    </div>
    <div class="token-actions">
      <button type="button" id="saveToken" class="btn btn-primary">Save</button>
      <button type="button" id="clearToken" class="btn btn-danger">Clear</button>
    </div>
    <p class="help-text">
      Create a <a href="https://github.com/settings/personal-access-tokens/new" target="_blank" rel="noopener">fine-grained token</a>
      with <strong>Contents: Read and write</strong> permission on the repos you want to edit.
      Tokens are stored locally and never sent to third parties.
    </p>
  </div>

  <script type="module" src="./popup.ts"></script>
</body>
</html>
